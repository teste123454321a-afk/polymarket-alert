name: Polymarket Daily Alert

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - uses: actions/cache@v4
        with:
          path: polymarket_snapshot.json
          key: snapshot-${{ github.run_number }}
          restore-keys: snapshot-

      - name: Run alert
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_QID_LARGE_TRADES: ${{ secrets.DUNE_QID_LARGE_TRADES }}
          DUNE_QID_WALLET_META: ${{ secrets.DUNE_QID_WALLET_META }}
          DUNE_QID_COORDINATION: ${{ secrets.DUNE_QID_COORDINATION }}
          DUNE_QID_FUNDING_SOURCES: ${{ secrets.DUNE_QID_FUNDING_SOURCES }}
        run: python polymarket_alert.py
